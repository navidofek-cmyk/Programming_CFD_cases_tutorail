<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6db2"/>
    </marker>
    <marker id="dimArrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M 0 5 L 10 0 L 8 5 L 10 10 z" fill="#333333"/>
    </marker>
    <style>
      .outline { fill: none; stroke: #111111; stroke-width: 3; }
      .wall { fill: none; stroke: #111111; stroke-width: 3; }
      .obstacle { fill: #4b4f56; stroke: #111111; stroke-width: 2; }
      .flow { stroke: #2f6db2; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dim { stroke: #333333; stroke-width: 2; fill: none; marker-start: url(#dimArrow); marker-end: url(#dimArrow); }
      .guide { stroke: #777777; stroke-width: 1.5; stroke-dasharray: 6 6; fill: none; }
      .label { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 24px; fill: #111111; }
      .small { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 20px; fill: #111111; }
      .title { font-family: 'DejaVu Sans', Arial, sans-serif; font-size: 28px; font-weight: 600; fill: #111111; }
      .accent { fill: #2f6db2; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="620" fill="#ffffff"/>

  <!-- Domain rectangle -->
  <rect x="120" y="150" width="1280" height="320" class="outline"/>

  <!-- Obstacle: x in [8H, 9H], y in [3.5H, 4.5H] -->
  <rect x="440" y="290" width="40" height="40" class="obstacle"/>

  <!-- Flow arrows -->
  <path d="M 40 220 L 105 220" class="flow"/>
  <path d="M 40 310 L 105 310" class="flow"/>
  <path d="M 40 400 L 105 400" class="flow"/>

  <!-- Outlet indicator -->
  <path d="M 1415 310 L 1480 310" class="flow"/>

  <!-- Coordinate axes -->
  <line x1="130" y1="540" x2="235" y2="540" class="flow"/>
  <line x1="130" y1="540" x2="130" y2="450" class="flow"/>
  <text x="245" y="548" class="label">x</text>
  <text x="118" y="440" class="label">y</text>

  <!-- Domain dimensions -->
  <line x1="120" y1="95" x2="1400" y2="95" class="dim"/>
  <line x1="120" y1="105" x2="120" y2="150" class="guide"/>
  <line x1="1400" y1="105" x2="1400" y2="150" class="guide"/>
  <text x="715" y="82" class="label">32H</text>

  <line x1="1470" y1="150" x2="1470" y2="470" class="dim"/>
  <line x1="1400" y1="150" x2="1460" y2="150" class="guide"/>
  <line x1="1400" y1="470" x2="1460" y2="470" class="guide"/>
  <text x="1485" y="315" class="label">8H</text>

  <!-- Obstacle dimensions -->
  <line x1="440" y1="255" x2="480" y2="255" class="dim"/>
  <line x1="440" y1="265" x2="440" y2="290" class="guide"/>
  <line x1="480" y1="265" x2="480" y2="290" class="guide"/>
  <text x="451" y="242" class="small">H</text>

  <line x1="515" y1="290" x2="515" y2="330" class="dim"/>
  <line x1="480" y1="290" x2="505" y2="290" class="guide"/>
  <line x1="480" y1="330" x2="505" y2="330" class="guide"/>
  <text x="525" y="316" class="small">H</text>

  <!-- Obstacle position -->
  <line x1="120" y1="505" x2="440" y2="505" class="dim"/>
  <line x1="120" y1="470" x2="120" y2="495" class="guide"/>
  <line x1="440" y1="330" x2="440" y2="495" class="guide"/>
  <text x="265" y="532" class="label">8H</text>

  <!-- Obstacle y-position -->
  <line x1="390" y1="470" x2="390" y2="330" class="dim"/>
  <line x1="400" y1="470" x2="440" y2="470" class="guide"/>
  <line x1="400" y1="330" x2="440" y2="330" class="guide"/>
  <text x="330" y="405" class="small">3.5H</text>

  <!-- Labels -->
  <text x="120" y="55" class="title">2D Channel With Square Obstacle Computational Domain</text>
  <text x="25" y="205" class="label">inlet</text>
  <text x="24" y="238" class="small">u = U_in</text>
  <text x="24" y="265" class="small">v = 0</text>

  <text x="1420" y="282" class="label">outlet</text>
  <text x="1420" y="340" class="small">p = 0</text>

  <text x="700" y="140" class="small">top wall, no-slip</text>
  <text x="670" y="500" class="small">bottom wall, no-slip</text>

  <text x="495" y="315" class="label">square obstacle</text>
  <text x="495" y="344" class="small">x in [8H, 9H]</text>
  <text x="495" y="370" class="small">y in [3.5H, 4.5H]</text>

  <text x="1110" y="585" class="small accent">Laminar incompressible channel flow, Re = 60</text>
</svg>
